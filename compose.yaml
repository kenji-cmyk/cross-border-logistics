name: cross-border-logistics

x-service: &go-service
  restart: unless-stopped
  env_file:
    - path: .env
      required: false
  environment:
    APP_ENV: ${APP_ENV:-development}
    POSTGRES_USER: ${POSTGRES_USER:-logistics}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    KAFKA_BROKERS: kafka:9092
    OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-1s}
    HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-2s}
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy
    kafka-init:
      condition: service_completed_successfully
  networks:
    - logistics
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
    interval: 10s
    timeout: 3s
    retries: 10
    start_period: 10s

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/scripts/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - logistics

  kafka:
    image: apache/kafka:3.9.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - logistics

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - logistics

  kafka-init:
    image: apache/kafka:3.9.1
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - >-
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic order.created.v1 --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.deposit_succeeded.v1 --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.remaining_balance_succeeded.v1 --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic order.status_changed.v1 --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic package.received.v1 --partitions 1 --replication-factor 1
    networks:
      - logistics

  quotation-service:
    <<: *go-service
    build:
      context: ./backend
      args:
        SERVICE: quotation-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QUOTATION_DB: ${QUOTATION_DB:-quotation_db}
      QUOTATION_SERVICE_PORT: 8080
      KAFKA_BROKERS: kafka:9092
      ADMIN_RATES_URL: ${ADMIN_RATES_URL:-http://admin-service:8080/api/v1/admin/rates}
      EXCHANGE_RATE_BASE_URL: ${EXCHANGE_RATE_BASE_URL:-}
      PRODUCT_EXTRACTOR_MODE: ${PRODUCT_EXTRACTOR_MODE:-demo}
      PRODUCT_ALLOWED_HOSTS: ${PRODUCT_ALLOWED_HOSTS:-}
      PRODUCT_FETCH_TIMEOUT: ${PRODUCT_FETCH_TIMEOUT:-1200ms}
      PRODUCT_MAX_RESPONSE_BYTES: ${PRODUCT_MAX_RESPONSE_BYTES:-1048576}
      PRODUCT_MAX_REDIRECTS: ${PRODUCT_MAX_REDIRECTS:-3}

  order-service:
    <<: *go-service
    build:
      context: ./backend
      args:
        SERVICE: order-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ORDER_DB: ${ORDER_DB:-order_db}
      ORDER_SERVICE_PORT: 8080
      KAFKA_BROKERS: kafka:9092
      QUOTATION_SERVICE_URL: http://quotation-service:8080

  payment-service:
    <<: *go-service
    build:
      context: ./backend
      args:
        SERVICE: payment-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PAYMENT_DB: ${PAYMENT_DB:-payment_db}
      PAYMENT_SERVICE_PORT: 8080
      KAFKA_BROKERS: kafka:9092
      ORDER_SERVICE_URL: http://order-service:8080
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_ACCOUNT_HOLDER: ${SEPAY_ACCOUNT_HOLDER:-}
      SEPAY_PAYMENT_CODE_PREFIX: ${SEPAY_PAYMENT_CODE_PREFIX:-CBL}
      SEPAY_QR_BASE_URL: ${SEPAY_QR_BASE_URL:-https://vietqr.app/img}
      SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET:-}
      SEPAY_PG_ENV: ${SEPAY_PG_ENV:-sandbox}
      SEPAY_PG_MERCHANT_ID: ${SEPAY_PG_MERCHANT_ID:-}
      SEPAY_PG_SECRET_KEY: ${SEPAY_PG_SECRET_KEY:-}
      SEPAY_PUBLIC_URL: ${SEPAY_PUBLIC_URL:-}

  warehouse-service:
    <<: *go-service
    build:
      context: ./backend
      args:
        SERVICE: warehouse-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      WAREHOUSE_DB: ${WAREHOUSE_DB:-warehouse_db}
      WAREHOUSE_SERVICE_PORT: 8080
      KAFKA_BROKERS: kafka:9092
      ORDER_SERVICE_URL: http://order-service:8080

  admin-service:
    <<: *go-service
    depends_on: {}
    build:
      context: ./backend
      args:
        SERVICE: admin-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      ADMIN_SERVICE_PORT: 8080
      ADMIN_SERVICE_FEE_PERCENT: ${ADMIN_SERVICE_FEE_PERCENT:-5}
      ADMIN_ESTIMATED_SHIPPING_FEE_VND: ${ADMIN_ESTIMATED_SHIPPING_FEE_VND:-120000}
      ADMIN_DEPOSIT_PERCENT: ${ADMIN_DEPOSIT_PERCENT:-70}
      ADMIN_SUPPORTED_CURRENCIES: ${ADMIN_SUPPORTED_CURRENCIES:-USD,CNY,JPY,KRW}
      ADMIN_EXCHANGE_RATE_USD: ${ADMIN_EXCHANGE_RATE_USD:-26000}
      ADMIN_EXCHANGE_RATE_CNY: ${ADMIN_EXCHANGE_RATE_CNY:-3600}
      ADMIN_EXCHANGE_RATE_JPY: ${ADMIN_EXCHANGE_RATE_JPY:-175}
      ADMIN_EXCHANGE_RATE_KRW: ${ADMIN_EXCHANGE_RATE_KRW:-19}
      EXCHANGE_RATE_PROVIDER: ${EXCHANGE_RATE_PROVIDER:-vietcombank}
      EXCHANGE_RATE_FETCH_TIMEOUT: ${EXCHANGE_RATE_FETCH_TIMEOUT:-2s}
      EXCHANGE_RATE_CACHE_TTL: ${EXCHANGE_RATE_CACHE_TTL:-5m}
      VIETCOMBANK_EXCHANGE_RATE_URL: ${VIETCOMBANK_EXCHANGE_RATE_URL:-https://portal.vietcombank.com.vn/Usercontrols/TVPortal.TyGia/pXML.aspx}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

  notification-service:
    <<: *go-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    build:
      context: ./backend
      args:
        SERVICE: notification-service
    environment:
      APP_ENV: ${APP_ENV:-development}
      NOTIFICATION_SERVICE_PORT: 8080
      KAFKA_BROKERS: kafka:9092

  api-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./backend/deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/deploy/nginx/proxy-headers.conf:/etc/nginx/proxy-headers.conf:ro
    depends_on:
      quotation-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      warehouse-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - logistics

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ui-health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - logistics

volumes:
  postgres-data:

networks:
  logistics:
    driver: bridge
