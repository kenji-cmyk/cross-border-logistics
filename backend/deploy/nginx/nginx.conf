events {}

http {
    upstream quotation_service {
        server quotation-service:8080;
    }

    upstream order_service {
        server order-service:8080;
    }

    upstream payment_service {
        server payment-service:8080;
    }

    upstream warehouse_service {
        server warehouse-service:8080;
    }

    upstream admin_service {
        server admin-service:8080;
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            default_type application/json;
            return 200 '{"status":"UP","service":"api-gateway"}';
        }

        location /api/v1/quotations {
            proxy_pass http://quotation_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/orders {
            proxy_pass http://order_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/payments {
            proxy_pass http://payment_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/warehouse {
            proxy_pass http://warehouse_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/admin {
            proxy_pass http://admin_service;
            include /etc/nginx/proxy-headers.conf;
        }
    }
}
