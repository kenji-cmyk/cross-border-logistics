events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream quotation_service {
        zone quotation_service 64k;
        server quotation-service:8080 resolve;
    }

    upstream order_service {
        zone order_service 64k;
        server order-service:8080 resolve;
    }

    upstream payment_service {
        zone payment_service 64k;
        server payment-service:8080 resolve;
    }

    upstream warehouse_service {
        zone warehouse_service 64k;
        server warehouse-service:8080 resolve;
    }

    upstream admin_service {
        zone admin_service 64k;
        server admin-service:8080 resolve;
    }

    upstream notification_service { zone notification_service 64k; server notification-service:8080 resolve; }

    server {
        listen 80;
        server_name _;

        location = /health {
            default_type application/json;
            return 200 '{"status":"UP","service":"api-gateway"}';
        }

        location /api/v1/quotations {
            proxy_pass http://quotation_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/orders {
            proxy_pass http://order_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/payments {
            proxy_pass http://payment_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/notifications/ {
			proxy_pass http://notification_service;
			include /etc/nginx/proxy-headers.conf;
			proxy_http_version 1.1;
			proxy_buffering off;
			proxy_cache off;
			proxy_read_timeout 1h;
		}

        location /api/v1/warehouse {
            proxy_pass http://warehouse_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location = /api/v1/admin {
            proxy_pass http://admin_service;
            include /etc/nginx/proxy-headers.conf;
        }

        location /api/v1/admin/ {
            proxy_pass http://admin_service;
            include /etc/nginx/proxy-headers.conf;
        }
    }
}
